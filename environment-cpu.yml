name: unfccc_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  
  # === Core Scientific Computing ===
  - numpy=1.26.4
  - pandas=2.2.1
  - scikit-learn=1.4.2
  - scipy=1.12.0
  
  # === Data Visualization ===
  - matplotlib=3.8.4
  - seaborn=0.13.2
  - plotly=5.19.0
  
  # === Machine Learning & NLP ===
  - pytorch-cpu  # CPU-only version of PyTorch
  - transformers
  - tokenizers
  
  # === Network Analysis ===
  - networkx=3.2.1
  
  # === File Processing ===
  - beautifulsoup4=4.12.3
  - pyyaml=6.0.1
  - regex
  
  # === Development Tools ===
  - ipython=8.18.1
  - jupyter
  - git
  
  # === System Tools ===
  # Note: curl and wget not available on Windows conda, but not essential for core functionality
  
  # === Streamlit and specific packages via pip ===
  - pip
  - pip:
    # === NLP & RAG Specific ===
    - sentence-transformers==2.6.1
    - faiss-cpu==1.7.4
    - openai==1.10.0
    - tiktoken==0.9.0
    
    # === Streamlit & Web ===
    - streamlit==1.32.2
    
    # === Clustering & Dimensionality Reduction ===
    - umap-learn==0.5.5
    # Note: hdbscan moved to conda-forge to avoid Windows compilation issues
    
    # === Network Visualization ===
    - pyvis==0.3.2
    
    # === PDF Processing ===
    - pymupdf==1.23.21
    # Note: pdfkit requires wkhtmltopdf which can be complex on Windows
    # - pdfkit==1.0.0
    - markdown2==2.4.12
    
    # === Utilities ===
    - python-dateutil==2.9.0.post0
    - joblib==1.3.2
    - psutil==5.9.0
    - accelerate
    # NOTE: Removed bitsandbytes (GPU-specific) and optimum for CPU compatibility
  
  # === Additional conda-forge packages ===
  - conda-forge::nltk
  - conda-forge::spacy
  - conda-forge::azure-storage-blob
  - conda-forge::python-dotenv
  - conda-forge::psutil
  - conda-forge::hdbscan  # Pre-compiled version to avoid Windows build issues 